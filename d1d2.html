<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Frameset Example with All Attributes</title>
</head>
<frameset rows="20%, 70%" border="5" frameborder="20" framespacing="50">
    
    <!-- Top header frame -->
    <frame src="header.html" name="header" marginwidth="10" marginheight="10" scrolling="yes" noresize="noresize">
    
    <!-- Bottom section split into 2 columns -->
    <frameset cols="30%, 70%" border="3" frameborder="20" framespacing="5" >
        <!-- Left sidebar -->
        <frame src="menu.html" name="sidebar" marginwidth="5" marginheight="5"  noresize="noresize">
        <!-- Main content -->
        <frame src="content.html" name="main" marginwidth="15" marginheight="15" >
    </frameset>

</frameset>
</html>
